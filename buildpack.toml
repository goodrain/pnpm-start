api = "0.7"

[buildpack]
  homepage = "https://github.com/goodrain/pnpm-start"
  id = "goodrain/pnpm-start"
  name = "Rainbond Buildpack for PNPM Start"
  version = "0.1.0"

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/goodrain/pnpm-start/blob/main/LICENSE"

[metadata]
  include-files = [
    "buildpack.toml",
    "linux/amd64/bin/build",
    "linux/amd64/bin/detect",
    "linux/amd64/bin/run",
    "linux/arm64/bin/build",
    "linux/arm64/bin/detect",
    "linux/arm64/bin/run",
  ]

  pre-package = "./scripts/build.sh --target linux/amd64 --target linux/arm64"

  [[metadata.configurations]]
    name = "BP_PNPM_START_SCRIPT"
    default = "start"
    description = "configures the pnpm script to be started"

[[stacks]]
  id = "*"

[[targets]]
  os = "linux"
  arch = "amd64"

[[targets]]
  os = "linux"
  arch = "arm64"
